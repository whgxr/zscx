services:
  mysql:
    image: mysql:5.7
    container_name: zscx-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zscx}
      MYSQL_USER: ${MYSQL_USER:-zscx}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zscx123456}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./jimureport/init.sql:/docker-entrypoint-initdb.d/02-jimureport.sql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000
      --explicit_defaults_for_timestamp=true
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # JimuReport 积木报表服务
  jimureport:
    build:
      context: ./jimureport
      dockerfile: Dockerfile
    container_name: zscx-jimureport
    restart: always
    ports:
      - "${JIMUREPORT_PORT:-8085}:8085"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=${MYSQL_DATABASE:-zscx}
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123456}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123456}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-zscx}?characterEncoding=UTF-8&useUnicode=true&useSSL=false&tinyInt1isBit=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    volumes:
      - ./jimureport/application-dev.yml:/jimureport/config/application-dev.yml
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: zscx-web
    restart: always
    ports:
      - "${WEB_PORT:-777}:3000"
    environment:
      - DATABASE_URL=mysql://${MYSQL_USER:-zscx}:${MYSQL_PASSWORD:-zscx123456}@mysql:3306/${MYSQL_DATABASE:-zscx}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_EXPIRES_IN=7d
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - UPLOAD_DIR=./public/uploads
      - MAX_FILE_SIZE=10485760
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-房屋征收调查系统}
      - NEXT_PUBLIC_JIMUREPORT_URL=http://jimureport:8085
      - NODE_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    command: sh -c "node prisma/docker-migrate.js && npm start"
    networks:
      - app-network

volumes:
  mysql_data:
  uploads:

networks:
  app-network:
    name: zscx_network
