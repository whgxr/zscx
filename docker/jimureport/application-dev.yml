server:
  port: 8085
  tomcat:
    max-swallow-size: -1
    uri-encoding: UTF-8
    connection-timeout: 60000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-exception: true
    include-stacktrace: ALWAYS
    include-message: ALWAYS
spring:
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL-HOST:127.0.0.1}:${MYSQL-PORT:3306}/${MYSQL-DB:jimureport}?characterEncoding=UTF-8&useUnicode=true&useSSL=false&tinyInt1isBit=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: 1
      host: 127.0.0.1
      port: 6379
      password:
  # 关闭登录认证（Next.js 已有认证，iframe 内嵌不需要二次登录）
  security:
    enable: false
    user:
      name: "admin"
      password: "123456"
  freemarker:
    suffix: .ftl
    content-type: text/html
    charset: UTF-8
    cache: false
    prefer-file-system-access: false
    template-loader-path:
      - classpath:/templates
    template_update_delay: 0
  jackson:
    charset: UTF-8
    default-property-inclusion: non_null
  mvc:
    contentnegotiation:
      media-types:
        json: application/json;charset=UTF-8
minidao:
  base-package: org.jeecg.modules.jmreport.*,org.jeecg.modules.drag.*
jeecg:
  uploadType: local
  path:
    upload: /opt/upload
  jmreport:
    saasMode:
    signatureSecret: dd05f1c54d63749eda95f9fa6d49v442a
    ai:
      base-url: https://api.deepseek.com
      api-key: 
      model: deepseek-v4-pro
      temperature: 0
      max-tokens: 16384
      autoTableEnabled: false
    firewall:
      dataSourceSafe: false
      lowCodeMode: dev
      sqlInjectionLevel: basic
    mail:
      enabled: false
    automate:
      export:
        enable-auto-export: true
        expired: 30
    col: 100
    row: 200
    apiBasePath: http://192.168.0.7:${JIMUREPORT_PORT:8085}
    max-data-rows: 100000
logging:
  level:
    org.jeecg.modules.jmreport: info